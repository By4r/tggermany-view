<!-- TG Germany header: utility bar + main bar + category nav + mega-menu + mobile nav + cart drawer -->
<header class="site-header" :class="{ 'is-condensed': condensed }" x-data="tgHeader()" @mouseleave="clearMega()" @keydown.escape.window="clearMega(); $store.ui.closeDrawer()">

  <!-- Row 1: utility bar -->
  <div class="utility-bar">
    <div class="container-tg flex items-center justify-between gap-4 h-9">
      <p class="truncate">750 ₺ ve üzeri tüm siparişlerde <b class="text-white">ücretsiz kargo</b></p>
      <div class="flex items-center gap-4">
        <div class="lang-switch" role="group" aria-label="Dil seçimi / Sprache">
          <button type="button" :class="$store.lang.current==='tr' && 'is-active'" @click="$store.lang.set('tr')" aria-label="Türkçe">TR</button>
          <button type="button" :class="$store.lang.current==='de' && 'is-active'" @click="$store.lang.set('de')" aria-label="Deutsch">DE</button>
        </div>
        <a href="kurumsal-satis.html" class="hidden sm:inline" x-text="$store.lang.t('corporate')">Kurumsal Satış</a>
        <a href="hakkimizda.html" class="hidden sm:inline">Hakkımızda</a>
        <span class="hidden md:inline data-tbd" title="Müşteri hizmetleri numarası eklenecek">Çağrı Merkezi: —</span>
      </div>
    </div>
  </div>

  <!-- Row 2: main bar (logo left · nav centered · actions right) -->
  <div class="container-tg flex items-center gap-3 py-3">
    <!-- left: hamburger + logo -->
    <div class="flex items-center gap-3 lg:flex-1 min-w-0">
      <button type="button" class="icon-btn tap lg:hidden" @click="$store.ui.toggleMobile()" aria-label="Menüyü aç">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <a href="index.html" class="shrink-0" aria-label="TG Germany ana sayfa">
        <img src="assets/img/logo.png" alt="TG Germany" class="logo-img" />
      </a>
    </div>

    <!-- center: category nav (lg+) -->
    <nav class="hidden lg:flex items-center justify-center gap-7" aria-label="Ürün kategorileri">
      <template x-for="c in cats" :key="c.slug">
        <a :href="'kategori.html#'+c.slug" class="nav-link" @mouseenter="setMega(c.slug)" @focus="setMega(c.slug)"
           :aria-expanded="mega===c.slug" x-text="c.name"></a>
      </template>
    </nav>

    <!-- right: actions (search icon + account + cart) -->
    <div class="flex items-center gap-1 ml-auto lg:ml-0 lg:flex-1 lg:justify-end">
      <button type="button" class="icon-btn tap text-ink" @click="toggleSearch()" :aria-expanded="searchOpen" aria-label="Ara">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button>
      <a href="#" class="icon-btn tap hidden sm:grid text-ink" :aria-label="$store.lang.t('account')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      </a>
      <button type="button" class="icon-btn tap relative text-ink" @click="$store.ui.openDrawer()" :aria-label="$store.lang.t('cart')">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6L5 3H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>
        <span class="cart-count" x-show="$store.cart.count > 0" x-text="$store.cart.count" x-cloak>0</span>
      </button>
    </div>
  </div>

  <!-- Search panel (revealed by the search icon) -->
  <!-- dim backdrop while search is open -->
  <div class="search-backdrop" x-show="searchOpen" x-transition.opacity x-cloak @click="closeSearch()"></div>

  <!-- Search panel (descends from header, roomy, with live suggestions) -->
  <div class="search-panel" x-show="searchOpen" x-collapse x-cloak @keydown.escape.window="closeSearch()">
    <div class="search-panel__inner">
      <form class="search-box" @submit.prevent="submitSearch()" role="search">
        <svg class="search-box__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="search" x-ref="searchInput" x-model="q" :placeholder="$store.lang.t('search')" aria-label="Ara" autocomplete="off" />
        <button type="button" class="search-clear" x-show="q.length" @click="clearQuery()" aria-label="Temizle" x-cloak>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
        <button type="submit" class="btn search-box__submit" aria-label="Ara">Ara</button>
      </form>

      <!-- live suggestions -->
      <div class="search-suggest" x-show="q.trim().length >= 2" x-cloak>
        <template x-for="r in results()" :key="r.id">
          <a :href="'urun.html#'+r.id" class="search-suggest__row" @click="closeSearch()">
            <span class="search-suggest__thumb" :style="'background-image:url('+r.photo+')'"></span>
            <span class="search-suggest__name" x-text="r.name"></span>
            <span class="price text-sm" x-text="fmt(r.price)"></span>
          </a>
        </template>
        <div class="search-empty" x-show="!results().length">"<span x-text="q"></span>" için sonuç bulunamadı.</div>
      </div>
    </div>
  </div>

  <!-- Mega panel (drops below the whole header; the sticky header is the positioned containing block) -->
  <div class="mega" x-show="mega" x-transition.opacity x-cloak @mouseenter="setMega(mega)">
    <template x-if="activeCat()">
      <div class="container-tg grid lg:grid-cols-2 gap-8 items-stretch py-7">
        <!-- left: subcategories -->
        <div class="grid grid-cols-2 gap-x-8 gap-y-1 content-start">
          <div class="col-span-2 label label--accent mb-2" x-text="activeCat().tag"></div>
          <template x-for="s in activeCat().sub" :key="s">
            <a :href="'kategori.html#'+activeCat().slug" class="py-2 text-body hover:text-primary-700 font-medium text-sm" x-text="s"></a>
          </template>
          <a :href="'kategori.html#'+activeCat().slug" class="col-span-2 mt-3 text-primary-700 font-semibold inline-flex items-center gap-1 text-sm">
            <span x-text="'Tüm '+activeCat().name+' ürünleri'"></span> →
          </a>
        </div>
        <!-- right: promo image covering the half, with overlay + TG logo -->
        <a :href="'kategori.html#'+activeCat().slug" class="mega-promo" :style="'background-image:url('+activeCat().photo+')'">
          <div class="mega-promo__overlay"></div>
          <img src="assets/img/logo.png" alt="TG Germany" class="mega-promo__logo" />
          <div class="mega-promo__content">
            <p class="mega-promo__title" x-text="activeCat().name"></p>
            <span class="btn btn--amber btn--sm">Keşfet</span>
          </div>
        </a>
      </div>
    </template>
  </div>

  <!-- ===== Mobile nav drawer ===== -->
  <template x-teleport="body">
    <div x-show="$store.ui.mobileNav" x-cloak>
      <div class="drawer-backdrop" @click="$store.ui.toggleMobile()" x-transition.opacity></div>
      <aside class="drawer" style="right:auto;left:0;box-shadow:12px 0 40px rgba(28,36,34,.16)"
             x-transition:enter="transition ease-out duration-200" x-transition:enter-start="-translate-x-full" x-transition:enter-end="translate-x-0"
             role="dialog" aria-label="Menü">
        <div class="drawer__head flex items-center justify-between">
          <span class="font-semibold text-ink">Menü</span>
          <button class="icon-btn tap" @click="$store.ui.toggleMobile()" aria-label="Kapat">✕</button>
        </div>
        <div class="drawer__body">
          <template x-for="c in cats" :key="c.slug">
            <div class="border-b border-line">
              <button class="w-full flex items-center justify-between py-3 font-medium text-ink"
                      @click="mobileOpen[c.slug] = !mobileOpen[c.slug]" :aria-expanded="!!mobileOpen[c.slug]">
                <span x-text="c.name"></span>
                <span x-text="mobileOpen[c.slug] ? '−' : '+'"></span>
              </button>
              <div x-show="mobileOpen[c.slug]" x-collapse class="pb-2">
                <template x-for="s in c.sub" :key="s">
                  <a :href="'kategori.html#'+c.slug" class="block py-2 pl-3 text-body text-sm" x-text="s"></a>
                </template>
              </div>
            </div>
          </template>
          <a href="kurumsal-satis.html" class="block py-3 border-b border-line font-medium text-ink">Kurumsal Satış</a>
          <a href="hakkimizda.html" class="block py-3 border-b border-line font-medium text-ink">Hakkımızda</a>
          <a href="iletisim.html" class="block py-3 font-medium text-ink">İletişim</a>
        </div>
      </aside>
    </div>
  </template>

  <!-- ===== Cart drawer ===== -->
  <template x-teleport="body">
    <div x-show="$store.ui.drawer" x-cloak>
      <div class="drawer-backdrop" @click="$store.ui.closeDrawer()" x-transition.opacity></div>
      <aside class="drawer"
             x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
             role="dialog" aria-label="Sepet">
        <div class="drawer__head flex items-center justify-between">
          <span class="font-semibold text-ink" x-text="$store.lang.t('cart') + ' (' + $store.cart.count + ')'">Sepetim</span>
          <button class="icon-btn tap" @click="$store.ui.closeDrawer()" aria-label="Kapat">✕</button>
        </div>

        <!-- Free-shipping progress (plain) -->
        <div class="px-5 pt-4" x-show="$store.cart.count > 0">
          <p class="text-xs mb-1" x-show="$store.cart.remaining > 0">
            <b class="text-primary-700" x-text="$store.cart.fmt($store.cart.remaining)"></b>
            <span x-text="' '+$store.lang.t('free_left')"></span>
          </p>
          <p class="text-xs mb-1 text-success font-semibold" x-show="$store.cart.remaining === 0" x-text="$store.lang.t('free_done')"></p>
          <div class="ship-bar"><i :style="'width:'+$store.cart.shipPct+'%'"></i></div>
        </div>

        <div class="drawer__body">
          <div x-show="$store.cart.count === 0" class="text-center py-12">
            <p class="text-body mb-4" x-text="$store.lang.t('empty')"></p>
            <a href="index.html" class="btn btn--secondary" @click="$store.ui.closeDrawer()" x-text="$store.lang.t('start')"></a>
          </div>
          <template x-for="i in $store.cart.items" :key="i.id">
            <div class="flex gap-3 py-3 border-b border-line">
              <div class="ratio-box rounded-md shrink-0 border border-line" style="width:64px;height:64px;background-color:#fff" :style="'background-image:url('+i.photo+')'"></div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-ink line-clamp-2" x-text="i.name"></p>
                <div class="flex items-center justify-between mt-2">
                  <div class="qty" role="group">
                    <button @click="$store.cart.dec(i.id)" aria-label="Azalt">−</button>
                    <span x-text="i.qty"></span>
                    <button @click="$store.cart.inc(i.id)" aria-label="Arttır">+</button>
                  </div>
                  <span class="price text-sm" x-text="$store.cart.fmt(i.price * i.qty)"></span>
                </div>
                <button class="text-xs text-muted hover:text-error mt-1" @click="$store.cart.remove(i.id)" x-text="$store.lang.t('remove')"></button>
              </div>
            </div>
          </template>
        </div>

        <div class="drawer__foot" x-show="$store.cart.count > 0">
          <div class="flex items-center justify-between mb-3">
            <span class="text-body" x-text="$store.lang.t('subtotal')"></span>
            <span class="price text-lg" x-text="$store.cart.fmt($store.cart.subtotal)"></span>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <a href="sepet.html" class="btn btn--secondary" x-text="$store.lang.t('view_cart')"></a>
            <a href="odeme.html" class="btn" x-text="$store.lang.t('checkout')"></a>
          </div>
        </div>
      </aside>
    </div>
  </template>
</header>
