<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kategori — TG Germany</title>
  <meta name="description" content="TG Germany ürün kategorilerini filtreleyin ve sıralayın. Şarj, ses, akıllı yaşam ve koruma çözümlerini keşfedin." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="180x180" href="assets/img/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tw-config.js"></script>
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-700-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-600-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-400-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-400-latin-ext.woff2" crossorigin />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <div data-include="partials/header.html"></div>

  <main x-data="tgCatalog()" x-init="init()">

    <!-- Visual + centered page hero (bg = active category photo, banner fallback) -->
    <section class="page-hero" style="--hero-scrim:.7">
      <div class="page-hero__bg" :style="'background-image:url('+((cat && cat.photo) || 'assets/img/banners/hero.webp')+')'" aria-hidden="true"></div>
      <div class="page-hero__scrim" aria-hidden="true"></div>
      <div class="page-hero__content">
        <nav class="breadcrumb" aria-label="Sayfa yolu">
          <a href="index.html">Ana Sayfa</a>
          <span class="sep">/</span>
          <template x-if="cat">
            <span class="current" x-text="cat.name"></span>
          </template>
          <template x-if="!cat">
            <span class="current">Tüm Ürünler</span>
          </template>
        </nav>
        <h1 class="page-hero__title" x-text="cat ? cat.name : 'Tüm Ürünler'"></h1>
        <p class="page-hero__sub" x-text="cat ? cat.desc : 'TG Germany ürün ailelerini keşfedin.'"></p>
      </div>
    </section>

    <section class="section" style="padding-top:24px">
      <div class="container-tg">

        <!-- Toolbar -->
        <div class="toolbar">
          <span class="toolbar__count">
            <b x-text="sorted.length"></b> ürün
            <template x-if="cat && f.sub"><span class="text-muted" x-text="' · ' + window.TG.subName(cat.slug, f.sub)"></span></template>
          </span>
          <div class="ml-auto flex items-center gap-2">
            <button type="button" class="btn btn--secondary btn--sm lg:hidden" @click="mobileFilters=true" aria-label="Filtreler">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
              Filtrele
            </button>
            <label class="sr-only" for="sortSelect">Sıralama</label>
            <select id="sortSelect" x-model="sort">
              <option value="onerilen">Önerilen</option>
              <option value="fiyat-artan">Fiyat: Artan</option>
              <option value="fiyat-azalan">Fiyat: Azalan</option>
              <option value="yeni">En Yeni</option>
              <option value="puan">En Yüksek Puan</option>
            </select>
            <div class="view-toggle" role="group" aria-label="Görünüm">
              <button type="button" :class="view==='grid' && 'is-active'" @click="view='grid'" aria-label="Izgara görünümü">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </button>
              <button type="button" :class="view==='list' && 'is-active'" @click="view='list'" aria-label="Liste görünümü">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Active filter chips -->
        <div class="flex flex-wrap items-center gap-2 pb-4" x-show="hasFilters" x-cloak>
          <template x-if="cat">
            <span class="chip"><span x-text="cat.name"></span><button type="button" @click="selectPillar(null)" aria-label="Kaldır">✕</button></span>
          </template>
          <template x-if="cat && f.sub">
            <span class="chip"><span x-text="window.TG.subName(cat.slug, f.sub)"></span><button type="button" @click="f.sub=null" aria-label="Kaldır">✕</button></span>
          </template>
          <template x-for="c in f.colors" :key="c">
            <span class="chip"><span x-text="c"></span><button type="button" @click="toggleColor(c)" aria-label="Kaldır">✕</button></span>
          </template>
          <template x-if="f.inStock">
            <span class="chip">Stokta var<button type="button" @click="f.inStock=false" aria-label="Kaldır">✕</button></span>
          </template>
          <template x-if="priceTouched">
            <span class="chip"><span x-text="priceLabel"></span><button type="button" @click="resetPrice()" aria-label="Kaldır">✕</button></span>
          </template>
          <button type="button" class="text-sm text-primary-700 font-medium underline ml-1" @click="clearFilters()">Filtreleri Temizle</button>
        </div>

        <div class="grid lg:grid-cols-[248px_1fr] gap-8">

          <!-- Filter sidebar (desktop) -->
          <aside class="hidden lg:block" aria-label="Filtreler">
            <!-- pillar (kategori) — always visible, first-class facet -->
            <div class="filter__group" style="padding-top:0">
              <p class="filter__title">Kategori</p>
              <label class="filter__opt">
                <input type="radio" name="pillar" :checked="!cat" @change="selectPillar(null)" />
                <span>Tümü</span>
              </label>
              <template x-for="c in window.TG.categories" :key="c.slug">
                <label class="filter__opt">
                  <input type="radio" name="pillar" :checked="cat && cat.slug===c.slug" @change="selectPillar(c.slug)" />
                  <span x-text="c.name"></span>
                </label>
              </template>
            </div>
            <!-- subcategory -->
            <div class="filter__group" x-show="cat && cat.sub.length">
              <p class="filter__title">Alt Kategori</p>
              <template x-for="s in (cat ? cat.sub : [])" :key="s.slug">
                <label class="filter__opt">
                  <input type="radio" name="sub" :value="s.slug" :checked="f.sub===s.slug" @click="f.sub = (f.sub===s.slug ? null : s.slug)" />
                  <span x-text="s.name"></span>
                </label>
              </template>
            </div>
            <!-- price -->
            <div class="filter__group">
              <p class="filter__title">Fiyat (₺)</p>
              <div class="price-range">
                <input type="number" min="0" placeholder="En az" x-model.number="f.min" aria-label="En az fiyat" />
                <span class="text-muted">–</span>
                <input type="number" min="0" placeholder="En çok" x-model.number="f.max" aria-label="En çok fiyat" />
              </div>
            </div>
            <!-- color -->
            <div class="filter__group" x-show="colors.length">
              <p class="filter__title">Renk</p>
              <template x-for="c in colors" :key="c">
                <label class="filter__opt">
                  <input type="checkbox" :checked="f.colors.includes(c)" @change="toggleColor(c)" />
                  <span class="swatch-dot" :style="'background:'+colorHex(c)"></span>
                  <span x-text="c"></span>
                </label>
              </template>
            </div>
            <!-- stock -->
            <div class="filter__group" style="border-bottom:0">
              <label class="filter__opt">
                <input type="checkbox" x-model="f.inStock" />
                <span>Sadece stokta olanlar</span>
              </label>
            </div>
          </aside>

          <!-- Product area -->
          <div>
            <!-- empty: no products in category at all -->
            <div class="empty-state" x-show="base.length === 0" x-cloak>
              <div class="empty-state__icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2l1.5 4h9L18 2"/><path d="M4 6h16l-1.5 13a2 2 0 0 1-2 1.8H7.5a2 2 0 0 1-2-1.8L4 6z"/></svg>
              </div>
              <p class="empty-state__title">Bu kategoride ürün bulunamadı</p>
              <p>Diğer kategorilerimizde aradığınız ürünü bulabilirsiniz.</p>
              <a href="index.html" class="btn">Kategorileri keşfet</a>
            </div>

            <!-- empty: filters exclude everything -->
            <div class="empty-state" x-show="base.length > 0 && sorted.length === 0" x-cloak>
              <div class="empty-state__icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h18l-7 8v6l-4 2v-8L3 4z"/></svg>
              </div>
              <p class="empty-state__title">Eşleşen ürün bulunamadı</p>
              <p>Seçtiğiniz filtrelerle uyumlu ürün yok. Filtreleri gevşetmeyi deneyin.</p>
              <button type="button" class="btn btn--secondary" @click="clearFilters()">Filtreleri Temizle</button>
            </div>

            <!-- grid view -->
            <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5" x-show="sorted.length && view==='grid'">
              <template x-for="p in paged" :key="p.id">
                <article class="card product-card" x-data="tgProductCard(p)">
                  <div class="media">
                    <span class="badge" :class="p.badge==='Yeni' && 'badge--new'" x-show="p.badge" x-text="p.badge"></span>
                    <button type="button" class="fav" :class="faved && 'is-faved'" :aria-pressed="faved" aria-label="Favorilere ekle/çıkar" @click.prevent="toggleFav()" x-text="faved ? '♥' : '♡'">♡</button>
                    <a :href="'urun.html#'+p.id" class="block"><div class="ratio-box ratio-1-1" :style="'background-image:url('+p.photo+')'"></div></a>
                    <button class="add-overlay" @click="addToCart()" :disabled="!p.stock" :aria-label="$store.lang.t('add')">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6L5 3H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>
                      <span x-text="!p.stock ? 'Tükendi' : $store.lang.t('add')"></span>
                    </button>
                  </div>
                  <div class="body">
                    <span class="label" x-text="window.TG.catName(p.cat)"></span>
                    <a :href="'urun.html#'+p.id"><h3 class="title" x-text="p.name"></h3></a>
                    <div class="rating-row"><span class="stars" x-text="stars(p.rating)"></span><span x-text="'('+p.reviews+')'"></span></div>
                    <div class="price-row">
                      <span class="price" :class="p.old && 'price--sale'" x-text="$store.cart.fmt(p.price)"></span>
                      <span class="price--old text-xs" x-show="p.old" x-text="$store.cart.fmt(p.old)"></span>
                    </div>
                  </div>
                </article>
              </template>
            </div>

            <!-- list view -->
            <div class="flex flex-col gap-4" x-show="sorted.length && view==='list'" x-cloak>
              <template x-for="p in paged" :key="p.id">
                <article class="card flex gap-4 p-3 sm:p-4" x-data="tgProductCard(p)">
                  <a :href="'urun.html#'+p.id" class="shrink-0">
                    <div class="ratio-box rounded-md w-[120px] h-[120px]" :style="'background-image:url('+p.photo+')'"></div>
                  </a>
                  <div class="flex-1 min-w-0 flex flex-col">
                    <div class="flex items-start justify-between gap-2">
                      <span class="label" x-text="window.TG.catName(p.cat)"></span>
                      <button type="button" class="text-lg leading-none" :class="faved ? 'text-sale' : 'text-muted'" @click.prevent="toggleFav()" aria-label="Favorilere ekle/çıkar" x-text="faved ? '♥' : '♡'"></button>
                    </div>
                    <a :href="'urun.html#'+p.id"><h3 class="font-medium text-ink mt-1 line-clamp-2" x-text="p.name"></h3></a>
                    <div class="rating-row mt-1"><span class="stars" x-text="stars(p.rating)"></span><span x-text="'('+p.reviews+')'"></span></div>
                    <p class="text-sm text-body mt-1 line-clamp-2 hidden sm:block" x-text="p.desc"></p>
                    <div class="flex items-end justify-between gap-3 mt-auto pt-2">
                      <div class="price-row">
                        <span class="price text-lg" :class="p.old && 'price--sale'" x-text="$store.cart.fmt(p.price)"></span>
                        <span class="price--old text-xs ml-2" x-show="p.old" x-text="$store.cart.fmt(p.old)"></span>
                      </div>
                      <button class="btn btn--sm" @click="addToCart()" :disabled="!p.stock" x-text="!p.stock ? 'Tükendi' : $store.lang.t('add')"></button>
                    </div>
                  </div>
                </article>
              </template>
            </div>

            <!-- Pagination -->
            <nav class="pager" x-show="pages > 1" aria-label="Sayfalama">
              <span class="is-disabled" x-show="page===1">‹</span>
              <a href="#" @click.prevent="goto(page-1)" x-show="page>1">‹</a>
              <template x-for="n in pages" :key="n">
                <a href="#" @click.prevent="goto(n)" :class="n===page && 'is-active'" x-text="n"></a>
              </template>
              <a href="#" @click.prevent="goto(page+1)" x-show="page<pages">›</a>
              <span class="is-disabled" x-show="page===pages">›</span>
            </nav>
          </div>
        </div>
      </div>
    </section>

    <!-- Related / öne çıkanlar -->
    <section class="section bg-soft" x-show="base.length > 0">
      <div class="container-tg">
        <h2 class="t-h2 mb-6">Çok Satanlar</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-4 md:gap-5">
          <template x-for="p in window.TG.byTrend(5)" :key="'tr-'+p.id">
            <article class="card product-card" x-data="tgProductCard(p)">
              <div class="media">
                <span class="badge" :class="p.badge==='Yeni' && 'badge--new'" x-show="p.badge" x-text="p.badge"></span>
                <button type="button" class="fav" :class="faved && 'is-faved'" :aria-pressed="faved" aria-label="Favorilere ekle/çıkar" @click.prevent="toggleFav()" x-text="faved ? '♥' : '♡'">♡</button>
                <a :href="'urun.html#'+p.id" class="block"><div class="ratio-box ratio-1-1" :style="'background-image:url('+p.photo+')'"></div></a>
                <button class="add-overlay" @click="addToCart()" :disabled="!p.stock" :aria-label="$store.lang.t('add')">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6L5 3H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>
                  <span x-text="!p.stock ? 'Tükendi' : $store.lang.t('add')"></span>
                </button>
              </div>
              <div class="body">
                <span class="label" x-text="window.TG.catName(p.cat)"></span>
                <a :href="'urun.html#'+p.id"><h3 class="title" x-text="p.name"></h3></a>
                <div class="rating-row"><span class="stars" x-text="stars(p.rating)"></span><span x-text="'('+p.reviews+')'"></span></div>
                <div class="price-row">
                  <span class="price" :class="p.old && 'price--sale'" x-text="$store.cart.fmt(p.price)"></span>
                  <span class="price--old text-xs" x-show="p.old" x-text="$store.cart.fmt(p.old)"></span>
                </div>
              </div>
            </article>
          </template>
        </div>
      </div>
    </section>

    <!-- Mobile filter drawer -->
    <template x-teleport="body">
      <div x-show="mobileFilters" x-cloak>
        <div class="drawer-backdrop" @click="mobileFilters=false" x-transition.opacity></div>
        <aside class="drawer" style="right:auto;left:0;box-shadow:12px 0 40px rgba(28,36,34,.16)"
               x-transition:enter="transition ease-out duration-200" x-transition:enter-start="-translate-x-full" x-transition:enter-end="translate-x-0"
               role="dialog" aria-label="Filtreler">
          <div class="drawer__head flex items-center justify-between">
            <span class="font-semibold text-ink">Filtrele</span>
            <button class="icon-btn tap" @click="mobileFilters=false" aria-label="Kapat">✕</button>
          </div>
          <div class="drawer__body">
            <div class="filter__group" style="padding-top:0">
              <p class="filter__title">Kategori</p>
              <label class="filter__opt">
                <input type="radio" name="mpillar" :checked="!cat" @change="selectPillar(null)" />
                <span>Tümü</span>
              </label>
              <template x-for="c in window.TG.categories" :key="'mp-'+c.slug">
                <label class="filter__opt">
                  <input type="radio" name="mpillar" :checked="cat && cat.slug===c.slug" @change="selectPillar(c.slug)" />
                  <span x-text="c.name"></span>
                </label>
              </template>
            </div>
            <div class="filter__group" x-show="cat && cat.sub.length">
              <p class="filter__title">Alt Kategori</p>
              <template x-for="s in (cat ? cat.sub : [])" :key="'m-'+s.slug">
                <label class="filter__opt">
                  <input type="radio" name="msub" :checked="f.sub===s.slug" @click="f.sub = (f.sub===s.slug ? null : s.slug)" />
                  <span x-text="s.name"></span>
                </label>
              </template>
            </div>
            <div class="filter__group">
              <p class="filter__title">Fiyat (₺)</p>
              <div class="price-range">
                <input type="number" min="0" placeholder="En az" x-model.number="f.min" aria-label="En az fiyat" />
                <span class="text-muted">–</span>
                <input type="number" min="0" placeholder="En çok" x-model.number="f.max" aria-label="En çok fiyat" />
              </div>
            </div>
            <div class="filter__group" x-show="colors.length">
              <p class="filter__title">Renk</p>
              <template x-for="c in colors" :key="'m-'+c">
                <label class="filter__opt">
                  <input type="checkbox" :checked="f.colors.includes(c)" @change="toggleColor(c)" />
                  <span class="swatch-dot" :style="'background:'+colorHex(c)"></span>
                  <span x-text="c"></span>
                </label>
              </template>
            </div>
            <div class="filter__group" style="border-bottom:0">
              <label class="filter__opt">
                <input type="checkbox" x-model="f.inStock" />
                <span>Sadece stokta olanlar</span>
              </label>
            </div>
          </div>
          <div class="drawer__foot grid grid-cols-2 gap-2">
            <button type="button" class="btn btn--secondary" @click="clearFilters()">Temizle</button>
            <button type="button" class="btn" @click="mobileFilters=false"><span x-text="sorted.length"></span> ürünü gör</button>
          </div>
        </aside>
      </div>
    </template>
  </main>

  <div data-include="partials/footer.html"></div>

  <div x-data>
    <template x-teleport="body">
      <div class="toast-host" aria-live="polite">
        <template x-for="t in $store.toast.items" :key="t.id">
          <div class="toast" :class="'toast--'+t.type" x-text="t.msg" x-cloak></div>
        </template>
      </div>
    </template>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    function tgCatalog() {
      return {
        cat: null,
        view: "grid",
        sort: "onerilen",
        page: 1,
        perPage: 8,
        mobileFilters: false,
        f: { sub: null, colors: [], min: null, max: null, inStock: false },
        init() {
          var slug = window.TG.parseHash();
          this.cat = slug ? window.TG.getCategory(slug) : null;
          var sub = window.TG.parseQuery("sub");
          if (sub) this.f.sub = sub;
          var self = this;
          window.addEventListener("hashchange", function () {
            var s = window.TG.parseHash();
            self.cat = s ? window.TG.getCategory(s) : null;
            self.clearFilters();
          });
          this.$watch("sort", function () { self.page = 1; });
          this.$watch("f", function () { self.page = 1; }, { deep: true });
        },
        get base() {
          return this.cat ? window.TG.byCategory(this.cat.slug) : window.TG.products.slice();
        },
        get colors() {
          var seen = [];
          this.base.forEach(function (p) { if (p.color && seen.indexOf(p.color) === -1) seen.push(p.color); });
          return seen;
        },
        colorHex(name) {
          var map = { "Siyah": "#1c2422", "Beyaz": "#f3f4f4", "Gri": "#9aa3a1", "Lacivert": "#1e2a52", "Şeffaf": "#dfe6e5" };
          return map[name] || "#cdd5d3";
        },
        get filtered() {
          var f = this.f;
          return this.base.filter(function (p) {
            if (f.sub && p.subSlug !== f.sub) return false;
            if (f.colors.length && f.colors.indexOf(p.color) === -1) return false;
            if (typeof f.min === "number" && !isNaN(f.min) && p.price < f.min) return false;
            if (typeof f.max === "number" && !isNaN(f.max) && p.price > f.max) return false;
            if (f.inStock && !p.stock) return false;
            return true;
          });
        },
        get sorted() { return window.TG.sortProducts(this.filtered, this.sort); },
        get pages() { return Math.max(1, Math.ceil(this.sorted.length / this.perPage)); },
        get paged() {
          var start = (this.page - 1) * this.perPage;
          return this.sorted.slice(start, start + this.perPage);
        },
        get hasFilters() {
          return !!this.cat || !!this.f.sub || this.f.colors.length > 0 || this.f.inStock || this.priceTouched;
        },
        get priceTouched() {
          return (typeof this.f.min === "number" && !isNaN(this.f.min)) || (typeof this.f.max === "number" && !isNaN(this.f.max));
        },
        get priceLabel() {
          var min = (typeof this.f.min === "number" && !isNaN(this.f.min)) ? this.f.min : "0";
          var max = (typeof this.f.max === "number" && !isNaN(this.f.max)) ? this.f.max : "∞";
          return min + "₺ – " + max + "₺";
        },
        toggleColor(c) {
          var i = this.f.colors.indexOf(c);
          if (i === -1) this.f.colors.push(c); else this.f.colors.splice(i, 1);
        },
        selectPillar(slug) {
          // URL/hash = source of truth; hashchange listener updates cat + clears filters.
          if (slug) {
            if (window.TG.parseHash() === slug) { this.clearFilters(); return; }
            location.hash = slug;
          } else {
            if (!window.TG.parseHash()) { this.clearFilters(); return; }
            // clear hash without leaving a "#" in the URL
            history.pushState("", document.title, location.pathname + location.search);
            this.cat = null;
            this.clearFilters();
          }
        },
        resetPrice() { this.f.min = null; this.f.max = null; },
        clearFilters() {
          this.f.sub = null; this.f.colors = []; this.f.min = null; this.f.max = null; this.f.inStock = false;
          this.page = 1;
        },
        goto(n) {
          if (n < 1 || n > this.pages) return;
          this.page = n;
          window.scrollTo({ top: 0, behavior: "smooth" });
        },
      };
    }
    window.tgCatalog = tgCatalog;
  </script>
