<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sipariş Detayı — TG Germany</title>
  <meta name="description" content="TG Germany sipariş detayınız: durum, ürünler, teslimat adresi, özet ve iade işlemleri." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="180x180" href="assets/img/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tw-config.js"></script>
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-700-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-600-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-400-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-400-latin-ext.woff2" crossorigin />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    /* ---- Fatura (Demo) modalı — sayfaya özel, foundation CSS'e dokunulmaz ---- */
    .invoice-modal { position: fixed; inset: 0; z-index: 210; display: flex; align-items: flex-start;
      justify-content: center; padding: 24px 16px; overflow-y: auto; }
    .invoice-modal__backdrop { position: fixed; inset: 0; background: rgba(28, 36, 34, .5); }
    .invoice-modal__dialog { position: relative; z-index: 1; width: min(720px, 100%); background: #fff;
      border-radius: var(--r-lg, 14px); box-shadow: var(--shadow-drawer, 0 24px 60px rgba(28,36,34,.22));
      margin: auto; overflow: hidden; }
    .invoice-modal__bar { display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--tg-line); }
    .invoice-sheet { padding: 24px; }
    @media (min-width: 768px) { .invoice-sheet { padding: 32px; } }
    .invoice-sheet__head { display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-between;
      padding-bottom: 18px; border-bottom: 1px solid var(--tg-line); }
    .invoice-sheet__logo { height: 30px; width: auto; margin-bottom: 10px; }
    .invoice-sheet__doc { font-size: 18px; font-weight: 700; color: var(--tg-ink); }
    .invoice-sheet__note { font-size: 12px; color: var(--tg-muted); margin-top: 4px; max-width: 30ch; }
    .invoice-sheet__meta { text-align: right; font-size: 13px; display: grid; gap: 4px; align-content: start; }
    .invoice-sheet__meta p { display: flex; gap: 10px; justify-content: flex-end; }
    .invoice-sheet__meta span { color: var(--tg-muted); }
    .invoice-sheet__meta b { color: var(--tg-ink); font-weight: 600; }
    .invoice-sheet__parties { display: grid; gap: 20px; padding: 18px 0; border-bottom: 1px solid var(--tg-line); }
    @media (min-width: 600px) { .invoice-sheet__parties { grid-template-columns: 1fr 1fr; } }
    .invoice-sheet__label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      color: var(--tg-muted); margin-bottom: 8px; }
    .invoice-sheet__addr { font-size: 13px; color: var(--tg-body); line-height: 1.55; }
    .invoice-table { width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 13px; }
    .invoice-table th { text-align: left; font-weight: 600; color: var(--tg-muted); font-size: 11px;
      letter-spacing: .04em; text-transform: uppercase; padding: 0 8px 10px; border-bottom: 1px solid var(--tg-line); }
    .invoice-table td { padding: 10px 8px; border-bottom: 1px solid var(--tg-line); color: var(--tg-ink); vertical-align: top; }
    .invoice-table .num { text-align: right; white-space: nowrap; }
    .invoice-totals { margin-left: auto; max-width: 320px; }
    .invoice-totals__row { display: flex; justify-content: space-between; gap: 16px; font-size: 13px;
      color: var(--tg-body); padding: 6px 0; }
    .invoice-totals__kdv { color: var(--tg-muted); }
    .invoice-totals__grand { border-top: 1px solid var(--tg-line); margin-top: 6px; padding-top: 12px;
      font-size: 16px; font-weight: 700; color: var(--tg-ink); }
    .invoice-sheet__foot { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--tg-line);
      font-size: 11px; color: var(--tg-muted); text-align: center; }

    /* ---- Yazdırma: yalnızca fatura görünür ---- */
    @media print {
      body { background: #fff !important; }
      body * { visibility: hidden !important; }
      .invoice-modal, .invoice-modal * { visibility: visible !important; }
      .invoice-modal { position: absolute !important; inset: 0; padding: 0; overflow: visible; display: block; }
      .invoice-modal__backdrop { display: none !important; }
      .invoice-modal__dialog { width: 100% !important; max-width: 100% !important; box-shadow: none !important;
        border-radius: 0 !important; margin: 0 !important; }
      .invoice-noprint { display: none !important; }
      .invoice-sheet { padding: 16px !important; }
    }
    @page { margin: 14mm; }
  </style>
</head>
<body>

  <div data-include="partials/header.html"></div>

  <main x-data="tgOrderDetail()" x-init="init()">

    <!-- ===== Valid order ===== -->
    <template x-if="order">
      <div>
        <section class="page-hero" style="--hero-scrim:.72">
          <div class="page-hero__bg" style="background-image:url('assets/img/banners/trust-bg.jpg')" aria-hidden="true"></div>
          <div class="page-hero__scrim" aria-hidden="true"></div>
          <div class="page-hero__content">
            <nav class="breadcrumb" aria-label="Sayfa konumu">
              <a href="index.html">Ana Sayfa</a><span class="sep">/</span>
              <a href="hesabim.html#siparisler">Siparişlerim</a><span class="sep">/</span>
              <span class="current" x-text="order.id"></span>
            </nav>
            <span class="page-hero__eyebrow">Sipariş Detayı</span>
            <div class="flex items-center justify-center gap-3 flex-wrap">
              <h1 class="page-hero__title" x-text="'Sipariş ' + order.id"></h1>
              <span class="status-badge" :class="badgeClass(order.status)" x-text="order.status"></span>
              <span class="demo-tag" x-show="order.demo" x-cloak>Demo verisi</span>
            </div>
            <p class="page-hero__sub" x-text="fmtDate(order.date) + ' tarihinde verildi'"></p>
          </div>
        </section>

        <section class="section">
          <div class="container-tg">
            <!-- status steps -->
            <div class="account-card mb-6">
              <h2 class="font-semibold text-ink mb-2">Sipariş Durumu</h2>
              <div class="order-status">
                <template x-for="(s, idx) in steps" :key="idx">
                  <div class="order-status__step" :class="stepState(idx)">
                    <div class="order-status__dot">
                      <svg x-show="stepState(idx)==='is-done'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                      <span x-show="stepState(idx)!=='is-done'" x-text="idx+1"></span>
                    </div>
                    <span x-text="s"></span>
                  </div>
                </template>
              </div>
            </div>

            <div class="grid gap-6 lg:grid-cols-3">
              <!-- left: items + address -->
              <div class="lg:col-span-2 grid gap-6">
                <!-- items -->
                <div class="account-card">
                  <h2 class="font-semibold text-ink mb-4">Ürünler</h2>
                  <div class="grid gap-3">
                    <template x-for="(it, idx) in order.items" :key="idx">
                      <div class="flex gap-3 items-center pb-3" :class="idx < order.items.length-1 && 'border-b border-line'">
                        <div class="rounded-md shrink-0 border border-line" :style="{ width:'64px', height:'64px', backgroundColor:'#fff', backgroundSize:'cover', backgroundPosition:'center', backgroundRepeat:'no-repeat', backgroundImage:'url('+it.photo+')' }"></div>
                        <div class="flex-1 min-w-0">
                          <a :href="'urun.html#'+it.id" class="block text-sm font-medium text-ink line-clamp-2" x-text="it.name"></a>
                          <p class="text-xs text-muted mt-1" x-text="it.qty + ' adet'"></p>
                        </div>
                        <span class="price text-sm shrink-0" x-text="$store.cart.fmt(it.price * it.qty)"></span>
                      </div>
                    </template>
                  </div>
                </div>

                <!-- address -->
                <div class="account-card" x-show="order.address">
                  <h2 class="font-semibold text-ink mb-3">Teslimat Adresi</h2>
                  <template x-if="order.address">
                    <div class="text-sm">
                      <p class="text-ink font-medium" x-text="(order.address.ad || '') + ' ' + (order.address.soyad || '')"></p>
                      <p class="mt-1" x-text="order.address.adres"></p>
                      <p x-text="(order.address.ilce || '') + (order.address.il ? ' / ' + order.address.il : '')"></p>
                      <p class="text-muted mt-1" x-show="order.address.telefon" x-text="order.address.telefon"></p>
                    </div>
                  </template>
                  <p class="text-sm mt-3 text-muted" x-show="order.shipping" x-text="'Kargo: ' + order.shipping"></p>
                </div>

                <!-- iade flow -->
                <div class="account-card">
                  <div class="flex items-center justify-between flex-wrap gap-2">
                    <h2 class="font-semibold text-ink">İade İşlemleri</h2>
                    <button type="button" class="btn btn--secondary btn--sm" @click="returnOpen=!returnOpen" x-show="!returnDone && returns.length===0">İade Oluştur</button>
                  </div>

                  <!-- existing returns -->
                  <template x-if="returns.length">
                    <div class="grid gap-3 mt-4">
                      <template x-for="r in returns" :key="r.id">
                        <div class="p-3 rounded-md border border-line" style="border-color:var(--tg-line)">
                          <div class="flex items-center justify-between gap-2 flex-wrap">
                            <span class="font-medium text-ink text-sm">İade talebi</span>
                            <span class="status-badge status-badge--prep" x-text="r.durum"></span>
                          </div>
                          <p class="text-sm mt-1">Sebep: <span class="text-ink" x-text="r.sebep"></span></p>
                          <p class="text-xs text-muted mt-1" x-text="fmtDate(r.tarih)"></p>
                        </div>
                      </template>
                    </div>
                  </template>

                  <!-- empty (no return yet, form closed) -->
                  <p class="text-sm mt-3" x-show="!returns.length && !returnOpen">14 gün içinde, kullanılmamış ürünler için iade talebi oluşturabilirsin.</p>

                  <!-- return form -->
                  <form @submit.prevent="submitReturn()" x-show="returnOpen" x-collapse class="mt-4" novalidate>
                    <div class="field" :class="returnErr && 'field--error'">
                      <label class="field__label">İade sebebi <span class="req">*</span></label>
                      <select x-model="returnReason">
                        <option value="">Sebep seçin</option>
                        <option>Ürün beklediğim gibi değil</option>
                        <option>Yanlış / eksik ürün geldi</option>
                        <option>Üründe hasar / arıza var</option>
                        <option>Vazgeçtim</option>
                        <option>Diğer</option>
                      </select>
                      <span class="field__error" x-show="returnErr" x-text="returnErr" x-cloak></span>
                    </div>
                    <div class="grid grid-cols-2 gap-2" style="max-width:340px">
                      <button type="button" class="btn btn--secondary btn--sm" @click="returnOpen=false">Vazgeç</button>
                      <button type="submit" class="btn btn--sm">İade Talebini Gönder</button>
                    </div>
                  </form>
                </div>
              </div>

              <!-- right: summary -->
              <div>
                <div class="order-summary lg:sticky" style="top:120px">
                  <h2 class="font-semibold text-ink mb-3">Sipariş Özeti</h2>
                  <div class="order-summary__row">
                    <span>Ara Toplam</span>
                    <span class="price" x-text="$store.cart.fmt(order.totals.ara)"></span>
                  </div>
                  <div class="order-summary__row" x-show="order.totals.indirim > 0">
                    <span>İndirim</span>
                    <span class="price" style="color:var(--tg-sale)" x-text="'-' + $store.cart.fmt(order.totals.indirim)"></span>
                  </div>
                  <div class="order-summary__row">
                    <span>Kargo</span>
                    <span class="price" x-text="order.totals.kargo > 0 ? $store.cart.fmt(order.totals.kargo) : 'Ücretsiz'"></span>
                  </div>
                  <div class="order-summary__row total">
                    <span>Genel Toplam</span>
                    <span class="price" x-text="$store.cart.fmt(order.totals.genel)"></span>
                  </div>
                  <p class="kdv-note">Fiyatlara KDV dahildir.</p>
                  <button type="button" class="btn btn--secondary btn--block mt-4" @click="openInvoice()">Faturayı Görüntüle</button>
                  <a href="hesabim.html#siparisler" class="btn btn--ghost btn--block mt-2">Siparişlerime Dön</a>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </template>

    <!-- ===== Missing / invalid order ===== -->
    <template x-if="!order">
      <div>
        <section class="page-hero" style="--hero-scrim:.72">
          <div class="page-hero__bg" style="background-image:url('assets/img/banners/trust-bg.jpg')" aria-hidden="true"></div>
          <div class="page-hero__scrim" aria-hidden="true"></div>
          <div class="page-hero__content">
            <nav class="breadcrumb" aria-label="Sayfa konumu">
              <a href="index.html">Ana Sayfa</a><span class="sep">/</span>
              <a href="hesabim.html#siparisler">Siparişlerim</a><span class="sep">/</span>
              <span class="current">Sipariş Detayı</span>
            </nav>
            <span class="page-hero__eyebrow">Sipariş Detayı</span>
            <h1 class="page-hero__title">Sipariş Detayı</h1>
          </div>
        </section>
        <section class="section">
          <div class="container-tg" style="max-width:560px">
            <div class="account-card empty-state">
              <div class="empty-state__icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
              </div>
              <p class="empty-state__title">Sipariş bulunamadı</p>
              <p>Aradığın sipariş kaydı bulunamadı. Bağlantı geçersiz veya sipariş silinmiş olabilir.</p>
              <a href="hesabim.html#siparisler" class="btn">Siparişlerime Git</a>
            </div>
          </div>
        </section>
      </div>
    </template>

    <!-- ===== Fatura (Demo) modalı ===== -->
    <template x-if="order">
      <template x-teleport="body">
        <div class="invoice-modal" x-show="invoiceOpen" x-cloak
             @keydown.escape.window="closeInvoice()">
          <div class="invoice-modal__backdrop" @click="closeInvoice()" x-transition.opacity></div>
          <div class="invoice-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="invoiceTitle"
               x-transition:enter="transition ease-out duration-200"
               x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">

            <!-- toolbar (ekranda; baskıda gizli) -->
            <div class="invoice-modal__bar invoice-noprint">
              <span class="font-semibold text-ink">Fatura (Demo)</span>
              <div class="flex items-center gap-2">
                <button type="button" class="btn btn--sm" @click="printInvoice()">Yazdır / PDF</button>
                <button type="button" class="icon-btn tap" @click="closeInvoice()" aria-label="Kapat">✕</button>
              </div>
            </div>

            <!-- yazdırılabilir alan -->
            <div class="invoice-sheet" id="invoiceSheet">
              <!-- header -->
              <div class="invoice-sheet__head">
                <div>
                  <img src="assets/img/logo.png" alt="TG Germany" class="invoice-sheet__logo" />
                  <p class="invoice-sheet__doc">Fatura (Demo)</p>
                  <p class="invoice-sheet__note">Bu belge örnek amaçlıdır — demo fatura, resmi belge değildir.</p>
                </div>
                <div class="invoice-sheet__meta">
                  <p><span>Sipariş No</span><b x-text="order.id"></b></p>
                  <p><span>Tarih</span><b x-text="fmtDate(order.date)"></b></p>
                  <p><span>Durum</span><b x-text="order.status"></b></p>
                </div>
              </div>

              <!-- müşteri / teslimat -->
              <div class="invoice-sheet__parties">
                <div>
                  <p class="invoice-sheet__label">Müşteri / Teslimat</p>
                  <template x-if="order.address">
                    <div class="invoice-sheet__addr">
                      <p class="text-ink font-medium" x-text="(order.address.ad || '') + ' ' + (order.address.soyad || '')"></p>
                      <p x-text="order.address.adres"></p>
                      <p x-text="(order.address.ilce || '') + (order.address.il ? ' / ' + order.address.il : '')"></p>
                      <p x-show="order.address.telefon" x-text="order.address.telefon"></p>
                      <p x-text="order.email"></p>
                    </div>
                  </template>
                  <template x-if="!order.address">
                    <div class="invoice-sheet__addr"><p x-text="order.email"></p></div>
                  </template>
                </div>
                <div>
                  <p class="invoice-sheet__label">Satıcı / Firma Bilgileri</p>
                  <div class="invoice-sheet__addr">
                    <p class="data-tbd" title="Firma ünvanı eklenecek">Ünvan: —</p>
                    <p class="data-tbd" title="Firma adresi eklenecek">Adres: —</p>
                    <p class="data-tbd" title="Vergi dairesi / no eklenecek">Vergi D. / No: —</p>
                    <p class="data-tbd" title="MERSİS no eklenecek">MERSİS: —</p>
                  </div>
                </div>
              </div>

              <!-- kalemler -->
              <table class="invoice-table">
                <thead>
                  <tr>
                    <th>Ürün</th>
                    <th class="num">Adet</th>
                    <th class="num">Birim Fiyat</th>
                    <th class="num">Toplam</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(it, idx) in order.items" :key="idx">
                    <tr>
                      <td x-text="it.name"></td>
                      <td class="num" x-text="it.qty"></td>
                      <td class="num" x-text="$store.cart.fmt(it.price)"></td>
                      <td class="num" x-text="$store.cart.fmt(it.price * it.qty)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>

              <!-- totals -->
              <div class="invoice-totals">
                <div class="invoice-totals__row">
                  <span>Ara Toplam</span>
                  <span x-text="$store.cart.fmt(order.totals.ara)"></span>
                </div>
                <div class="invoice-totals__row" x-show="order.totals.indirim > 0">
                  <span>İndirim</span>
                  <span x-text="'-' + $store.cart.fmt(order.totals.indirim)"></span>
                </div>
                <div class="invoice-totals__row">
                  <span>Kargo</span>
                  <span x-text="order.totals.kargo > 0 ? $store.cart.fmt(order.totals.kargo) : 'Ücretsiz'"></span>
                </div>
                <div class="invoice-totals__row invoice-totals__kdv">
                  <span>KDV (%20 dahil)</span>
                  <span x-text="$store.cart.fmt(kdvDahil())"></span>
                </div>
                <div class="invoice-totals__row invoice-totals__grand">
                  <span>Genel Toplam</span>
                  <span x-text="$store.cart.fmt(order.totals.genel)"></span>
                </div>
              </div>

              <p class="invoice-sheet__foot">
                Fiyatlara KDV dahildir · TG Germany — demo fatura, resmi belge değildir.
              </p>
            </div>
          </div>
        </div>
      </template>
    </template>

  </main>

  <div data-include="partials/footer.html"></div>

  <div x-data>
    <template x-teleport="body">
      <div class="toast-host" aria-live="polite">
        <template x-for="t in $store.toast.items" :key="t.id">
          <div class="toast" :class="'toast--'+t.type" x-text="t.msg" x-cloak></div>
        </template>
      </div>
    </template>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    function tgOrderDetail() {
      return {
        order: null,
        steps: ['Hazırlanıyor', 'Kargoda', 'Teslim Edildi'],
        returnOpen: false, returnReason: '', returnErr: '', returnDone: false,
        returns: [],
        invoiceOpen: false,
        init() {
          var id = window.TG.parseQuery('id');
          this.order = id ? this.$store.orders.get(id) : null;
          if (this.order) this.refreshReturns();
        },
        refreshReturns() { this.returns = this.$store.returns.forOrder(this.order.id); },
        statusIndex() {
          var i = this.steps.indexOf(this.order.status);
          return i === -1 ? 0 : i;
        },
        stepState(idx) {
          var cur = this.statusIndex();
          if (idx < cur) return 'is-done';
          if (idx === cur) return 'is-current';
          return '';
        },
        badgeClass(status) {
          if (status === 'Teslim Edildi') return 'status-badge--done';
          if (status === 'Kargoda') return 'status-badge--ship';
          return 'status-badge--prep';
        },
        fmtDate(iso) {
          try { return new Date(iso).toLocaleDateString('tr-TR', { day: '2-digit', month: 'long', year: 'numeric' }); }
          catch (e) { return ''; }
        },
        /* KDV-DAHİL %20: dahil olan KDV tutarı = genel × 20/120 = genel / 6 */
        kdvDahil() { return Math.round((this.order.totals.genel / 6) * 100) / 100; },
        openInvoice() { this.invoiceOpen = true; document.body.style.overflow = 'hidden'; },
        closeInvoice() { this.invoiceOpen = false; document.body.style.overflow = ''; },
        printInvoice() { window.print(); },
        submitReturn() {
          this.returnErr = '';
          if (!this.returnReason) { this.returnErr = 'Lütfen bir iade sebebi seçin.'; return; }
          this.$store.returns.add({ orderId: this.order.id, items: this.order.items, sebep: this.returnReason });
          this.returnOpen = false; this.returnDone = true; this.returnReason = '';
          this.refreshReturns();
          this.$store.toast.push('İade talebin alındı');
        },
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="assets/js/include.js"></script>
</body>
</html>
