<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siparişiniz Alındı — TG Germany</title>
  <meta name="description" content="Siparişiniz başarıyla oluşturuldu. Sipariş özetinizi görüntüleyin ve takip edin." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="180x180" href="assets/img/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tw-config.js"></script>
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-700-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-600-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-400-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-400-latin-ext.woff2" crossorigin />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <div data-include="partials/header.html"></div>

  <main x-data="tgOrderDone()" x-init="init()">
    <section class="section">
      <div class="container-tg" style="max-width:760px">

        <!-- Found -->
        <template x-if="order">
          <div>
          <div class="text-center">
            <div class="empty-state__icon" style="background:rgba(31,157,87,.14);color:var(--tg-success);width:72px;height:72px">
              <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <h1 class="t-h1 mt-4">Siparişiniz alındı</h1>
            <p class="mt-2">Teşekkür ederiz. Siparişiniz başarıyla oluşturuldu; hazırlanmaya başladığında e-posta ile bilgilendirileceksiniz.</p>
            <p class="mt-3 text-sm">Sipariş No: <b class="text-ink" x-text="order && order.id"></b></p>
          </div>

          <div class="order-summary mt-8" style="padding:24px">
            <h2 class="font-semibold text-ink text-lg mb-4">Sipariş Özeti</h2>
            <template x-for="i in (order ? order.items : [])" :key="i.id">
              <div class="flex gap-3 py-3 border-b border-line items-center">
                <div class="ratio-box rounded-md border border-line shrink-0 w-[60px] h-[60px] bg-white" :style="'background-image:url('+i.photo+')'"></div>
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-medium text-ink line-clamp-2" x-text="i.name"></p>
                  <p class="text-xs text-muted mt-0.5" x-text="'Adet: ' + i.qty"></p>
                </div>
                <span class="price text-sm" x-text="fmt(i.price * i.qty)"></span>
              </div>
            </template>

            <div class="order-summary__row mt-3">
              <span>Ara Toplam</span>
              <span class="price" x-text="fmt(order.totals.ara)"></span>
            </div>
            <div class="order-summary__row text-success" x-show="order.totals.indirim > 0">
              <span>İndirim</span>
              <span class="price" style="color:inherit" x-text="'− ' + fmt(order.totals.indirim)"></span>
            </div>
            <div class="order-summary__row">
              <span>Kargo</span>
              <span class="price" x-text="order.totals.kargo === 0 ? 'Ücretsiz' : fmt(order.totals.kargo)"></span>
            </div>
            <div class="order-summary__row total">
              <span>Genel Toplam</span>
              <span x-text="fmt(order.totals.genel)"></span>
            </div>
            <p class="kdv-note">Fiyatlara KDV dahildir.</p>

            <div class="mt-5 pt-5 border-t border-line" x-show="order.address">
              <p class="label mb-1">Teslimat Adresi</p>
              <p class="text-sm text-body" x-show="order.address">
                <span x-text="order.address ? (order.address.ad + ' ' + order.address.soyad) : ''"></span><br>
                <span x-text="order.address ? order.address.adres : ''"></span><br>
                <span x-text="order.address ? (order.address.ilce + ' / ' + order.address.il) : ''"></span>
              </p>
            </div>
          </div>

          <div class="grid sm:grid-cols-3 gap-3 mt-6">
            <a :href="'siparis-takip.html'" class="btn btn--secondary">Siparişi Takip Et</a>
            <a href="hesabim.html#siparisler" class="btn btn--secondary">Siparişlerim</a>
            <a href="kategori.html" class="btn">Alışverişe Devam</a>
          </div>
          </div>
        </template>

        <!-- Missing id -->
        <div x-show="!order" x-cloak>
          <div class="empty-state">
            <div class="empty-state__icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
            </div>
            <p class="empty-state__title">Sipariş bulunamadı</p>
            <p>Görüntülemek istediğiniz sipariş bulunamadı. Sipariş numaranızla takip edebilir veya hesabınızdan siparişlerinizi görebilirsiniz.</p>
            <div class="flex flex-wrap justify-center gap-3 mt-4">
              <a href="siparis-takip.html" class="btn btn--secondary">Sipariş Takip</a>
              <a href="kategori.html" class="btn">Alışverişe Devam</a>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div data-include="partials/footer.html"></div>

  <div x-data>
    <template x-teleport="body">
      <div class="toast-host" aria-live="polite">
        <template x-for="t in $store.toast.items" :key="t.id">
          <div class="toast" :class="'toast--'+t.type" x-text="t.msg" x-cloak></div>
        </template>
      </div>
    </template>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    function tgOrderDone() {
      return {
        order: null,
        init() {
          var id = window.TG.parseQuery("id");
          this.order = id ? this.$store.orders.get(id) : null;
        },
        fmt(v) { return window.tgFormatPrice(v); },
      };
    }
    window.tgOrderDone = tgOrderDone;
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="assets/js/include.js"></script>
</body>
</html>
