<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arama — TG Germany</title>
  <meta name="description" content="TG Germany ürünlerinde arama sonuçları." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="180x180" href="assets/img/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tw-config.js"></script>
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-700-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-600-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-400-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/poppins-400-latin-ext.woff2" crossorigin />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <div data-include="partials/header.html"></div>

  <main x-data="tgSearchPage()" x-init="init()">

    <div class="container-tg">
      <nav class="breadcrumb" aria-label="Sayfa yolu">
        <a href="index.html">Ana Sayfa</a>
        <span class="sep">/</span>
        <span class="current">Arama</span>
      </nav>
    </div>

    <section class="section" style="padding-top:8px">
      <div class="container-tg">

        <!-- Search box -->
        <form class="search-box max-w-xl mb-6" @submit.prevent="runSearch()" role="search">
          <svg class="search-box__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="search" x-model="q" placeholder="Ürün, kategori veya marka ara" aria-label="Ara" autocomplete="off" />
          <button type="submit" class="btn search-box__submit">Ara</button>
        </form>

        <h1 class="t-h1 mb-1" x-show="q.trim()">
          "<span x-text="q.trim()"></span>" için sonuçlar
        </h1>
        <p class="toolbar__count mb-6" x-show="q.trim()"><b x-text="results.length"></b> ürün bulundu</p>

        <!-- Results -->
        <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5" x-show="results.length">
          <template x-for="p in results" :key="p.id">
            <article class="card product-card" x-data="tgProductCard(p)">
              <div class="media">
                <span class="badge" :class="p.badge==='Yeni' && 'badge--new'" x-show="p.badge" x-text="p.badge"></span>
                <button type="button" class="fav" :class="faved && 'is-faved'" :aria-pressed="faved" aria-label="Favorilere ekle/çıkar" @click.prevent="toggleFav()" x-text="faved ? '♥' : '♡'">♡</button>
                <a :href="'urun.html#'+p.id" class="block"><div class="ratio-box ratio-1-1" :style="'background-image:url('+p.photo+')'"></div></a>
                <button class="add-overlay" @click="addToCart()" :disabled="!p.stock" :aria-label="$store.lang.t('add')">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6L5 3H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>
                  <span x-text="!p.stock ? 'Tükendi' : $store.lang.t('add')"></span>
                </button>
              </div>
              <div class="body">
                <span class="label" x-text="window.TG.catName(p.cat)"></span>
                <a :href="'urun.html#'+p.id"><h3 class="title" x-text="p.name"></h3></a>
                <div class="rating-row"><span class="stars" x-text="stars(p.rating)"></span><span x-text="'('+p.reviews+')'"></span></div>
                <div class="price-row">
                  <span class="price" :class="p.old && 'price--sale'" x-text="$store.cart.fmt(p.price)"></span>
                  <span class="price--old text-xs" x-show="p.old" x-text="$store.cart.fmt(p.old)"></span>
                </div>
              </div>
            </article>
          </template>
        </div>

        <!-- No results -->
        <div x-show="q.trim() && results.length === 0" x-cloak>
          <div class="empty-state">
            <div class="empty-state__icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            </div>
            <p class="empty-state__title">Sonuç bulunamadı</p>
            <p>"<span x-text="q.trim()"></span>" aramanıza uygun ürün yok. Farklı bir kelime deneyin veya kategorilere göz atın.</p>
          </div>
          <div class="max-w-xl mx-auto">
            <p class="text-sm font-medium text-ink text-center mb-3">Kategorilere göz atın</p>
            <div class="flex flex-wrap justify-center gap-2">
              <template x-for="c in window.TG.categories" :key="c.slug">
                <a :href="'kategori.html#'+c.slug" class="chip" style="height:38px;padding:0 16px"><span x-text="c.name"></span></a>
              </template>
            </div>
          </div>
        </div>

        <!-- No query -->
        <div class="empty-state" x-show="!q.trim()" x-cloak>
          <div class="empty-state__icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          </div>
          <p class="empty-state__title">Ne aramıştınız?</p>
          <p>Aramak istediğiniz ürünün adını yukarıdaki kutuya yazın.</p>
        </div>

      </div>
    </section>
  </main>

  <div data-include="partials/footer.html"></div>

  <div x-data>
    <template x-teleport="body">
      <div class="toast-host" aria-live="polite">
        <template x-for="t in $store.toast.items" :key="t.id">
          <div class="toast" :class="'toast--'+t.type" x-text="t.msg" x-cloak></div>
        </template>
      </div>
    </template>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    function tgSearchPage() {
      return {
        q: "",
        init() {
          this.q = window.TG.parseQuery("q") || "";
          if (this.q) document.title = '"' + this.q + '" — Arama — TG Germany';
        },
        get results() { return window.TG.search(this.q); },
        runSearch() {
          var v = this.q.trim();
          if (v) location.href = "arama.html?q=" + encodeURIComponent(v);
        },
        stars(r) {
          var full = Math.round(r);
          return "★★★★★".slice(0, full) + "☆☆☆☆☆".slice(0, 5 - full);
        },
      };
    }
    window.tgSearchPage = tgSearchPage;
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="assets/js/include.js"></script>
</body>
</html>
